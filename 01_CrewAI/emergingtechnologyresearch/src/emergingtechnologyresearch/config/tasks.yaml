research_task:
  description: >
    Conduct a thorough research about {topic} Make sure you find any interesting and relevant information given the
    current year is {current_year}.
  expected_output: >
    A list with 10 bullet points of the most relevant information about {topic}
  agent: researcher

reporting_task:
  description: >
    Review the context you got and expand each topic into a full section for a report. Make sure the report is detailed
    and contains any and all relevant information.
  expected_output: >
    A fully fledged report with the main topics, each with a full section of information. Output should have multiple
    sections. Each section has topic as a string representing title of the section, overview as a string giving brief
    overview of the section, keyDevelopments as an array of strings to represent key developments in the topic of
    section, and impact as a string representing the impact the topic had on the world.
  agent: reporting_analyst
